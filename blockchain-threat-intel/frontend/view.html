<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>View Threat Intelligence</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <div class="brand">🛡️ Threat Intel Network</div>
  <div>
    <a href="dashboard.html" id="navDashboardLink">Dashboard</a>
    <a href="submit.html" id="navSubmitLink">Submit Report</a>
    <a href="view.html">View Threats</a>
    <a href="verify.html">Verify Report</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="container">
  <h1>🌐 Shared Threat Intelligence</h1>

  <div class="card">
    <div class="grid-2">
      <div class="form-group">
        <label>Filter by Attack Type</label>
        <select id="filterType">
          <option value="">All Types</option>
          <option value="DDoS">DDoS</option>
          <option value="Phishing">Phishing</option>
          <option value="Malware">Malware</option>
          <option value="Ransomware">Ransomware</option>
          <option value="SQL Injection">SQL Injection</option>
          <option value="Man-in-the-Middle">Man-in-the-Middle</option>
          <option value="Zero-Day">Zero-Day</option>
          <option value="Insider Threat">Insider Threat</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Search</label>
        <input type="text" id="searchBox" placeholder="Search title, type, or organization..." />
      </div>
    </div>
    <button onclick="loadThreats()">🔍 Search</button>
  </div>

  <div id="alertBox" class="alert" style="display:none;"></div>

  <div id="threatList"></div>
</div>

<script src="js/api.js"></script>
<script src="js/view.js"></script>
</body>
</html>
