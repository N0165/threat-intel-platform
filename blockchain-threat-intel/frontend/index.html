<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Threat Intel Sharing - Login</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="container" style="max-width:460px; margin-top: 60px;">
  <h1 style="text-align:center;">🛡️ Threat Intel Network</h1>
  <p class="muted" style="text-align:center; margin-bottom:30px;">
    Blockchain-based cybersecurity threat intelligence sharing
  </p>

  <div class="tabs">
    <a href="#" id="tabLogin" class="active" onclick="showForm('login')">Login</a>
    <a href="#" id="tabRegister" onclick="showForm('register')">Register</a>
  </div>

  <div class="card">
    <div id="alertBox" class="alert" style="display:none;"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@organization.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••" />
      </div>
      <button type="submit" style="width:100%;">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none;">
      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="regOrgName" required placeholder="e.g. Acme Cyber Defense" />
        <p class="muted" style="font-size:0.78rem; margin-top:4px;">Each organization gets one Admin account and one Analyst account.</p>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" required placeholder="you@organization.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" required minlength="6" placeholder="At least 6 characters" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="regRole">
          <option value="admin">Admin</option>
          <option value="analyst">Analyst</option>
        </select>
      </div>
      <button type="submit" style="width:100%;">Create Account</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
